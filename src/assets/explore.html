<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>akron explore</title>
<style>
:root {
  color-scheme: dark light;
  --bg: #0b0d10;
  --panel: #10141a;
  --line: #222831;
  --ink: #c6cdd6;
  --dim: #7d8794;
  --accent: #6cb6ff;
  --sel: #e8edf2;
  --err: #d3766f;
  --link: #e3b341;
  --call: #dba25e;
  --call-in: #9d8fd6;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f4f5f6;
    --panel: #ffffff;
    --line: #d7dce2;
    --ink: #24292f;
    --dim: #67717d;
    --accent: #2670c2;
    --sel: #1c2127;
    --err: #a04b43;
    --link: #9a6700;
    --call: #96601c;
    --call-in: #6f56c4;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font: 12px/1.45 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  overflow: hidden;
}

/* ── top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
  white-space: nowrap;
}
/* breadcrumb: where am I / how do I get back (drill-down, TKI-54) */
#crumbs { display: flex; align-items: center; gap: 4px; min-width: 0; }
#crumbs .seg { cursor: pointer; color: var(--dim); }
#crumbs .seg:hover { color: var(--accent); }
#crumbs .seg.here { color: var(--ink); font-weight: 700; cursor: default; }
#crumbs .sep { color: var(--dim); }
#count { color: var(--dim); }
#searchwrap { position: relative; flex: 1; max-width: 420px; }
#search {
  width: 100%;
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 3px 7px;
  font: inherit;
  outline: none;
}
#search:focus { border-color: var(--accent); }
#hitlist {
  position: absolute;
  top: calc(100% + 3px);
  left: 0;
  right: 0;
  max-height: 320px;
  overflow-y: auto;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 3px;
  z-index: 10;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}
#hitlist div {
  padding: 3px 8px;
  cursor: pointer;
  display: flex;
  gap: 8px;
  overflow: hidden;
}
#hitlist div:hover { background: var(--bg); }
#hitlist div.err { color: var(--err); cursor: default; }
#hitlist div.err:hover { background: var(--panel); }
#hitlist .rank { color: var(--dim); width: 2ch; text-align: right; }
#hitlist .score { color: var(--accent); }
#hitlist .loc { color: var(--dim); margin-left: auto; }
#topbar label { color: var(--dim); display: flex; align-items: center; gap: 4px; }
#topbar select {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 3px;
  font: inherit;
  padding: 2px 3px;
  max-width: 190px;
}
#topbar input[type=checkbox] { accent-color: var(--accent); }
/* calls depth control (TKI-72/79): ≥24px hit target (#19) without changing
   the bar's height — padding expands the hit box, the negative margin
   refunds it */
#callsLbl { padding: 6px 4px; margin: -6px -4px; }
#views { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
#views button {
  background: var(--panel);
  color: var(--dim);
  border: none;
  border-right: 1px solid var(--line);
  font: inherit;
  padding: 3px 10px;
  cursor: pointer;
}
#views button:last-child { border-right: none; }
#views button.on { background: var(--bg); color: var(--ink); box-shadow: inset 0 -2px 0 var(--accent); }
#views button:disabled { color: var(--line); cursor: default; }
#axpick { display: inline-flex; gap: 10px; }
#axpick[hidden] { display: none; }

/* ── legend chips ── */
#chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 4px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 1px 7px;
  border: 1px solid var(--line);
  border-radius: 9px;
  cursor: pointer;
  color: var(--dim);
  user-select: none;
}
.chip .dot { width: 8px; height: 8px; border-radius: 50%; }
.chip.on { border-color: var(--accent); color: var(--ink); }
/* drill affordance (TKI-68): the chip's click means focus, so descent gets
   its own visible glyph — no double-click anywhere */
.chip .drill { cursor: pointer; padding: 0 3px; }
.chip .drill:hover { color: var(--accent); }
/* the branch chip: accent glyph instead of a dir color dot */
.chip.branch .glyph { color: var(--accent); font-weight: 700; }

/* ── main ── */
main { display: grid; grid-template-columns: 1fr 340px; min-height: 0; position: relative; }
/* the viewer needs room for code; the landing (guide) state keeps the
   original 340px so the map's first impression is untouched */
main.hasSel { grid-template-columns: 1fr minmax(420px, 46%); }
/* overflow hidden (TKI-69): ambient LOD cards are world-anchored DOM and
   can straddle the stage edge — clip them at the map boundary so they can
   never paint over the panel, header, or legend. Pinned boards/peek/tip
   are viewport-clamped already, so this changes nothing for them. */
#stage { position: relative; min-width: 0; overflow: hidden; }
#map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

/* ── hover tooltip (TKI-66): identity at the cursor; never a hit target ── */
#tip {
  position: absolute;
  z-index: 15;
  pointer-events: none;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 4px 8px;
  max-width: 360px;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
#tip[hidden] { display: none; }
#tip .t-name { font-weight: 700; word-break: break-all; }
#tip .t-loc { color: var(--dim); word-break: break-all; }
#tip .t-terms { color: var(--accent); word-break: break-all; }
#tip .t-hint { color: var(--dim); }

/* ── peek card (TKI-68): dwell on a dot blooms a small code window;
   pointer-events: none — it discloses, the click underneath commits ── */
#peek {
  position: absolute;
  z-index: 16;
  pointer-events: none;
  width: 320px;
  overflow: hidden;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
  opacity: 1;
  transition: opacity .12s ease-out;
}
#peek[hidden] { display: none; }
#peek .pk-head { padding: 4px 8px; border-bottom: 1px solid var(--line); }
#peek .t-name { font-weight: 700; word-break: break-all; }
#peek .t-loc { color: var(--dim); word-break: break-all; }
#peek .t-terms { color: var(--accent); word-break: break-all; }
#peek pre.code {
  margin: 0;
  border: none;
  border-radius: 0;
  /* fits the full 12-line cut at 11px/1.5 — the "N more lines" count must
     describe what is actually shown, never a clipped body */
  max-height: 210px;
  overflow: hidden;
  font-size: 11px;
  padding: 6px 8px;
}
#peek .pk-more { color: var(--dim); padding: 2px 8px 4px; }

/* ── board cards (TKI-68): pinned code windows anchored to their dots ── */
.board {
  position: absolute;
  z-index: 12;
  width: 340px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 6px 18px rgba(0,0,0,.4);
}
.board.big { width: 520px; }
.board.droptarget { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 6px 18px rgba(0,0,0,.4); }
.board .bhead {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 4px 3px 8px;
  border-bottom: 1px solid var(--line);
  cursor: grab;
  user-select: none;
}
.board .bhead:active { cursor: grabbing; }
.board .bname { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.board .bloc { color: var(--dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.board .bact { color: var(--dim); cursor: pointer; min-width: 24px; padding: 4px 0; text-align: center; }
.board .bact:hover { color: var(--accent); }
.board pre.code { margin: 0; border: none; border-radius: 0; max-height: 240px; font-size: 11px; }
.board.big pre.code { max-height: 60vh; }
.board .bwait { color: var(--dim); padding: 6px 8px; }

/* ── LOD cards (TKI-69): ambient world-scaled cards. Display only —
   pointer-events: none, so a click passes through to the dot beneath,
   which pins/selects exactly as before. Hover discloses, click commits. ── */
.board.lod { z-index: 11; pointer-events: none; transform-origin: top left; opacity: 0.97; }
.board.lod .bhead { cursor: default; }

/* minimized boards dock as chips (soft cap: the oldest card yields) */
#btray {
  position: absolute;
  right: 8px;
  bottom: 8px;
  z-index: 12;
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 4px;
  max-width: 50%;
}
#btray .bchip {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 1px 8px;
  cursor: pointer;
  color: var(--dim);
  max-width: 180px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#btray .bchip:hover { color: var(--accent); border-color: var(--accent); }

/* ── side panel ── */
#panel {
  border-left: 1px solid var(--line);
  background: var(--panel);
  overflow-y: auto;
  padding: 10px 12px;
}
#panel .empty { color: var(--dim); }
#panel h2 { font-size: 13px; line-height: 1.3; display: flex; align-items: baseline; gap: 8px; }
#panel h2 .name { min-width: 0; word-break: break-all; flex: 1; }
#panel h2 .ctx { color: var(--dim); font-weight: 400; }
#panel h2 .close { flex: none; color: var(--dim); cursor: pointer; }
#panel h2 .close:hover { color: var(--accent); }
#panel .loc { color: var(--dim); }
#panel .loc .pathseg { cursor: pointer; }
/* drill affordance (TKI-66): path segments visibly act on hover */
#panel .loc .pathseg:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
#panel .meta { margin-top: 3px; }
#panel .meta .k { color: var(--dim); }
#panel .facts { margin-top: 3px; color: var(--dim); word-break: break-word; }
#panel section { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 8px; }
#panel h3 {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
#panel h3 .dim {
  color: var(--dim);
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
}
#panel ul { list-style: none; }
#panel li {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0 10px;
  align-items: baseline;
  padding: 2px 6px;
  margin: 0 -6px;
  border-radius: 3px;
  cursor: pointer;
  transition: background-color .1s linear;
}
#panel li.cos-row { grid-template-columns: minmax(0, 1fr) auto 4ch; }
#panel li.cos-row2 { grid-template-columns: minmax(0, 1fr) auto 4ch 4ch; }
/* per-row compare action (TKI-66): one extra column when present */
#panel li.has-cmp { grid-template-columns: minmax(0, 1fr) auto auto; }
#panel li.cos-row.has-cmp { grid-template-columns: minmax(0, 1fr) auto 4ch auto; }
#panel li.cos-row2.has-cmp { grid-template-columns: minmax(0, 1fr) auto 4ch 4ch auto; }
#panel li .cmpgo { color: var(--dim); cursor: pointer; visibility: hidden; }
#panel li:hover .cmpgo { visibility: visible; }
#panel li .cmpgo:hover { color: var(--accent); }
#panel li:hover { background: var(--bg); }
#panel li .name {
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#panel li .name .ctx { color: var(--dim); font-weight: 400; }
#panel li .loc { text-align: right; white-space: nowrap; }
#panel li .cos {
  color: var(--accent);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
#panel .none { color: var(--dim); }
#panel .shared { color: var(--dim); word-break: break-all; margin-top: 2px; }
/* nearest-neighbor list (TKI-70): visited this session, not hidden */
#panel li.visited { opacity: .55; }
#panel li.visited .name::before { content: "✓ "; }

/* ── code viewer (TKI-61) ── */
#panel .actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.chipbtn {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 3px;
  font: inherit;
  padding: 2px 9px;
  cursor: pointer;
}
.chipbtn:hover { border-color: var(--accent); color: var(--accent); }
pre.code {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 3px;
  overflow: auto;
  /* code first, but the card's facts stay one scroll away on long bodies */
  max-height: 64vh;
  tab-size: 4;
  line-height: 1.5;
}
/* token classes: keyword / string / comment / number / def-name / call */
.tok-kw  { color: #c78bb1; }
.tok-str { color: #b3ae6b; }
.tok-com { color: var(--dim); font-style: italic; }
.tok-num { color: #6fc3c9; }
.tok-def { color: #dba25e; font-weight: 700; }
.tok-call { color: #7fb3d9; }
@media (prefers-color-scheme: light) {
  .tok-kw  { color: #8f4f7f; }
  .tok-str { color: #6f6b2a; }
  .tok-num { color: #256e74; }
  .tok-def { color: #96601c; }
  .tok-call { color: #2670c2; }
}
/* identifiers that resolve to a symbol in the index: one click from source */
.lnk { text-decoration: underline; text-decoration-color: var(--dim); text-underline-offset: 2px; cursor: pointer; }
.lnk:hover { color: var(--accent); text-decoration-color: var(--accent); }

/* ── compare: side-by-side over the main area (esc closes) ── */
#cmp { position: absolute; inset: 0; z-index: 20; background: var(--panel); display: grid; grid-template-rows: auto auto 1fr; }
#cmp[hidden] { display: none; }
#cmpbar {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 5px 10px;
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
  overflow: hidden;
}
#cmpbar select {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 3px;
  font: inherit;
  padding: 2px 6px;
  max-width: 320px;
}
#cmpbar .legend { color: var(--dim); margin-left: auto; display: flex; align-items: center; }
#cmpempty {
  padding: 4px 10px;
  border-bottom: 1px solid var(--line);
  color: var(--dim);
}
#cmppanes { display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
#cmppanes.pending { opacity: .45; pointer-events: none; transition: opacity 120ms; }
.cmppane { position: relative; overflow: auto; padding: 8px 10px; }
.cmppane:first-child { border-right: 1px solid var(--line); }
.cmppane .panehead { color: var(--dim); margin-bottom: 6px; word-break: break-all; }
.cmppane .panehead b { color: var(--ink); }
.cmppane pre { tab-size: 4; line-height: 1.5; }
.reg { border-radius: 2px; }
.reg.hot { outline: 1px solid var(--accent); }
/* legend swatches (TKI-71): the same .reg class + regColor() output the
   real pane regions use, so the legend can't drift from the rendering */
.legend .reg { display: inline-block; width: 1em; height: 1em; vertical-align: -0.15em; margin: 0 2px; }
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}

/* ── about this view (TKI-81): one discoverable place that teaches the
   current view — the layout, the encodings, their limits — in full
   sentences, replacing the caption nuggets that used to ride the canvas.
   Top-right corner (#20) — the bottom corners belong to the axis values
   and the board tray, and the top-left to the search hitlist. ── */
#about { position: absolute; right: 8px; top: 8px; z-index: 14; text-align: right; }
#aboutBtn {
  display: inline-block;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 1px 8px;
  color: var(--dim);
  cursor: pointer;
  user-select: none;
}
#aboutBtn:hover, #about.open #aboutBtn { color: var(--accent); border-color: var(--accent); }
#aboutPop {
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  width: 360px;
  text-align: left;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 8px 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}
#aboutPop[hidden] { display: none; }
#aboutPop p { margin: 0 0 7px; }
#aboutPop p:last-child { margin-bottom: 0; }

/* ── footer ── */
footer {
  padding: 3px 10px;
  border-top: 1px solid var(--line);
  background: var(--panel);
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>
<header id="topbar">
  <span id="crumbs"></span>
  <span id="count"></span>
  <div id="searchwrap">
    <input id="search" type="text" spellcheck="false" autocomplete="off"
           placeholder="find a name, or ask a question">
    <div id="hitlist" hidden></div>
  </div>
  <nav id="views">
    <button data-mode="map" class="on">map</button>
    <button data-mode="anchor" disabled>anchor</button>
    <button data-mode="time">time</button>
    <button data-mode="axes">axes</button>
  </nav>
  <span id="axpick" hidden>
    <label>x <select id="ax"></select></label>
    <label>y <select id="ay"></select></label>
  </span>
  <label><input type="checkbox" id="tests"> tests</label>
  <label id="callsLbl" title="Follow calls around the selected symbol, out to this many hops. Amber arrows point at what it calls; violet arrows come from what calls it. Farther hops draw fainter, and a dashed arrow means the name matched several candidates. Only static, name-resolved calls are traced — dynamic dispatch is invisible.">calls <select id="calls">
    <option value="0">off</option>
    <option value="1" selected>1 hop</option>
    <option value="2">2 hops</option>
    <option value="3">3 hops</option>
  </select></label>
</header>
<div id="chips"></div>
<main>
  <div id="stage"><canvas id="map"></canvas><div id="tip" hidden></div><div id="peek" hidden></div><div id="btray"></div><div id="about"><div id="aboutPop" hidden></div><span id="aboutBtn">about this view</span></div></div>
  <aside id="panel"><div class="empty" id="card">loading…</div></aside>
  <div id="cmp" hidden>
    <div id="cmpbar">
      <button class="chipbtn" id="cmpclose">✕ close</button>
      <span id="cmptitle"></span>
      <span class="sep">⟷</span>
      <select id="cmpbsel" title="compare against"></select>
      <span class="legend"></span>
    </div>
    <div id="cmpempty" hidden>no structural overlap between these two — pick another symbol to compare</div>
    <div id="cmppanes"></div>
  </div>
</main>
<footer><span id="readout"></span></footer>
<script>
"use strict";
const BOOT = __AKRON_BOOT__;

/* ── palette: muted categorical, Okabe-Ito-leaning, legible on both themes ── */
const PALETTE = ["#7fb3d9","#dba25e","#66b298","#c78bb1","#9d8fd6","#d3766f",
                 "#b3ae6b","#6fc3c9","#9aa5b1","#bd8f62","#8fc07e","#c4a3e0"];

const AXES = [
  {id:"map_x", label:"map x"}, {id:"map_y", label:"map y"},
  {id:"anchor_a", label:"structure similarity to the anchor"},
  {id:"anchor_b", label:"vocabulary similarity to the anchor"},
  {id:"age", label:"age (first seen)"},
  {id:"recency", label:"recency (last touched)"},
  {id:"file", label:"file order"},
  {id:"pca0", label:"PCA-1"}, {id:"pca1", label:"PCA-2"},
  {id:"pca2", label:"PCA-3"}, {id:"pca3", label:"PCA-4"},
  {id:"pca4", label:"PCA-5"}, {id:"pca5", label:"PCA-6"},
  {id:"pca6", label:"PCA-7"}, {id:"pca7", label:"PCA-8"},
];

let S = [];                 // /api/symbols
let META = {pca_var: [], labels: {prod: [], full: []}}; // /api/meta
let radii = [];             // px per symbol
let dirColor = {};          // top-level dir -> color
let showTests = BOOT.tests;
// calls channel (TKI-72/79): BFS hops from the selection. Default 1 — the
// chain is part of what selecting means (CEO: "the chain of calls really
// tells you what matters"); 0 = off stays a choice for a quieter map.
let callDepth = 1;
let callsTouched = false;   // the user has changed the dropdown this session
let callersOf = [];         // per-symbol incoming call ids — S[].calls inverted once at boot
let focusDirs = new Set();  // legend chips; empty = all
let branchFocus = false;    // branch chip: ring branch-new, fade the rest
let selected = -1;          // selected symbol id == the anchor
let hovered = -1;
let hits = [];              // /api/find results
let hitSet = new Set();
let anchor = {id:-1, a:null, b:null};
let drill = null;           // /api/sublayout payload + set/slot indexes; null = whole repo
let visited = new Set();    // ids selected this session (guidance: "next")
let navStack = [];          // back-history of selections (viewer loop, TKI-61)
let cmp = null;             // /api/compare payload while the overlay is open
let picking = -1;           // compare pick mode (TKI-66): the A-side id, or -1
let labelBoxes = [];        // dir labels placed this frame, for single-click drill
let mouse = null;           // last cursor position; hover hit-tests run per rAF
let edgeHover = null;       // {a, b} — the labeled layout edge under the cursor
let hoverLabel = null;      // the drillable island label under the cursor
let linkHover = -1;         // symbol id named by a hovered panel row (TKI-70)

// (L.r, the gating median), then just above; a label with no clear spot —
// or one colliding with an already-placed label (count-desc order, big

// centroid labels stop meaning anything.

  labelBoxes = [];

  const src = drill ? drill.labels : META.labels;
  const labs = showTests ? src.full : src.prod;
  if (!labs.length) return;
  ctx.font = "10px ui-monospace, Menlo, monospace";
  ctx.textAlign = "center";
  ctx.fillStyle = ink;
  const focus = focusDirs.size > 0;
  const placed = [];
  const clearOfPoints = box => {
    for (let i = 0; i < S.length; i++) {
      if (!visible(S[i])) continue;
      const [x, y] = screenXY(i);
      const t = radii[i] + 3; // the click hit-target
      if (x + t > box.x0 && x - t < box.x1 && y + t > box.y0 && y - t < box.y1) return false;
    }
    return true;
  };
  for (const L of labs) {
    const bx = PAD + L.x * (W - 2 * PAD), by = H - PAD - L.y * (H - 2 * PAD);
    const sx = bx * view.k + view.tx, sy = by * view.k + view.ty;
    if (sx < -80 || sx > W + 80 || sy < -20 || sy > H + 20) continue;
    const rs = L.r * (W - 2 * PAD) * view.k; // island core radius, on screen
    const w = ctx.measureText(L.dir).width;
    let box = null;
    for (const cy of [sy, sy + rs + 14, sy - rs - 8]) {
      const b = {x0: sx - w / 2 - 4, x1: sx + w / 2 + 4, y0: cy - 12, y1: cy + 4};
      if (clearOfPoints(b) &&
          !placed.some(o => o.x0 < b.x1 && b.x0 < o.x1 && o.y0 < b.y1 && b.y0 < o.y1)) {

    if (!box) continue;
    placed.push(box);
    labelBoxes.push({...box, path: drillTarget(L.dir)});
    ctx.globalAlpha = focus && !focusDirs.has(L.dir) ? 0.12 : 0.75;
    ctx.fillText(L.dir, sx, box.y1 - 4);

  ctx.textAlign = "start";
}

// month/year tick marks for the time view's date axis
function timeTicks(lo, hi) {
  const out = [];
  const spanDays = (hi - lo) / 86400;
  const stepMonths = spanDays > 1100 ? 12 : spanDays > 400 ? 3 : 1;
  const d0 = new Date(lo * 1000);
  let y = d0.getUTCFullYear(), m = d0.getUTCMonth() + 1;
  for (let i = 0; i < 400; i++) {
    if (m > 11) { m -= 12; y += 1; }
    const t = Date.UTC(y, m, 1) / 1000;
    if (t > hi) break;
    if (m % stepMonths === 0) {
      out.push({t, label: stepMonths === 12 || m === 0
        ? String(y) : `${y}-${String(m + 1).padStart(2, "0")}`});
    }
    m += 1;

function drawLodCards(W, H) {
  const shown = new Set();

    const focus = focusDirs.size > 0;
    for (let i = 0; i < S.length; i++) {
      if (!visible(S[i]) || boardFor(i)) continue;
      if (focus && !focusDirs.has(dirOf(S[i]))) continue;
      const cell = cellOf(i, W);
      if (cell < LOD.cardCell) continue;
      const [x, y] = screenXY(i);
      if (x < -400 || y < -300 || x > W + 60 || y > H + 60) continue;
      cands.push({i, cell, x, y});
    }
    cands.sort((a, b) => b.cell - a.cell || a.i - b.i); // deterministic cap
  }
  for (const cd of cands) {
    if (shown.size >= LOD.cardCap) break;
    const c = lodCard(cd.i);
    if (!c.el.isConnected) $("stage").appendChild(c.el); // c.h keys on content, not attachment
    fillLodCard(c, cd.i);
    if (!c.h) c.h = c.el.offsetHeight; // measured once per content change
    const sc = Math.min(1.25, cd.cell / LOD.cardScale);
    const r = {x: cd.x + 10, y: cd.y + 10, w: 340 * sc, h: c.h * sc};
    // overlap thinning (TKI-78): a card that would land on an already-
    // placed card beyond a sliver skips this frame — a wall of cards is
    // less information, not more (#23). The dot keeps its canvas chip
    // (drawChips skips only lodShown), so nothing goes nameless, and a
    // later, non-clashing candidate takes the freed cap slot. The cleanup
    // sweep below detaches the skipped card's element.
    let clash = false;
    for (const o of rects.values()) {
      if (r.x + LOD.tol < o.x + o.w && o.x + LOD.tol < r.x + r.w &&
          r.y + LOD.tol < o.y + o.h && o.y + LOD.tol < r.y + r.h) { clash = true; break; }
    }
    if (clash) continue;
    if (!srcCache.has(cd.i)) lodWish.push({id: cd.i, cell: cd.cell});
    c.el.style.transform = `scale(${sc})`;
    c.el.style.left = r.x + "px";
    c.el.style.top = r.y + "px";
    shown.add(cd.i);
    rects.set(cd.i, r);
  }

    if (!shown.has(id) && c.el.isConnected) c.el.remove();
  }

}
// Ambient lines between visible LOD cards that are layout neighbors — the
// visible set IS the graph, no pinning required. Same hit band, hover tip
// and click→compare as pinned-board connectors (segs share connSegs).
// Spaghetti cap: each card connects to at most its top-2 visible
// neighbors, in the layout's own nnp/nn ranking order (deterministic);
// pairs dedupe. Pinned-board and manual-pair connectors are unaffected.
function drawLodConnectors(rects, accent) {

      if (!rects.has(j)) continue;
      pairs.add(pairKey(id, j));
      if (++n >= 2) break;
    }
  }
  for (const key of pairs) {
    const [lo, hi] = key.split(":").map(Number);
    drawConnSeg(rects.get(lo), rects.get(hi), lo, hi, accent, true);

// The settle drain: the view has been still for LOD.settle ms — fetch the

// a bounded batch per settle. Everything lands in srcCache (shared with
// the peek and boards), so nothing is ever fetched twice.
function drainLod() {

  for (const w of batch) ensureSource(w.id);

// Unselect (TKI-80): the reverse of select() — an empty-canvas click,

async function deselect() {
  if (selected < 0) return;

  if (mode === "anchor") { await applyMode("map"); return; } // already painted

/* ── selection: the anchor ── */
async function select(id, center, fromBack) {
  // compare pick mode (TKI-66): a click chooses the B side, nothing else
  if (picking >= 0) {
    const a = picking;
    picking = -1;
    openCompare(a, id);
    footer();
    return;
  }
  // selecting outside the drill (search hit, card reference) exits to the
  // whole-repo map — the breadcrumb resets, so "where am I" stays obvious
  if (drill && !drill.set.has(id)) await drillTo("");
  // back-history (TKI-61): every selection is retraceable; a pop itself
  // never re-pushes, so the ← chip walks straight back (TKI-80: esc no
  // longer drives this — it clears the selection instead)
  if (!fromBack && selected >= 0 && selected !== id) {
    navStack.push(selected);
    if (navStack.length > 64) navStack.shift();
  }
  closeCompare();
  selected = id;
  visited.add(id);
  document.querySelector("main").classList.add("hasSel");
  loadCard(id);
  syncViews();
  if (isAnchorAxis(axisX) || isAnchorAxis(axisY)) {
    await loadAnchor(id);
    layout();
    // Re-anchoring re-projects every point and the anchor itself is the
    // (1,1) corner by construction — centering the old viewport on it
    // shoves the whole distribution off-screen. Refit instead.
    if (center) fitView();

    centerOn(id);
  }

  scheduleDraw();
}
async function loadAnchor(id) {
  if (anchor.id === id) return;
  const r = await fetch(`/api/anchor?id=${id}`);
  const j = await r.json();
  // stale-response guard (same as loadCard): if the selection moved while
  // this fetch was in flight, a later loadAnchor owns the state.
  if (id !== selected) return;
  anchor = {id, a: j.a_cos, b: j.b_cos};

/* ── the card ── */
// middle-ellipsis: keeps the path's head (the dir that places it) and tail
// (the file that names it); the full path rides in the title attr
function midPath(p, budget) {
  if (p.length <= budget) return p;
  const head = Math.ceil((budget - 1) / 2), tail = budget - 1 - head;
  return p.slice(0, head) + "…" + p.slice(-tail);
}
// "Class.method" → dimmed "Class." context + emphasized "method"
function qnameSpan(qname) {
  const span = document.createElement("span");
  span.className = "name";
  const parts = qname.split(".");
  const base = parts.pop();
  if (parts.length) {
    const ctx = document.createElement("span");
    ctx.className = "ctx";
    ctx.textContent = parts.join(".") + ".";
    span.appendChild(ctx);
  }
  span.appendChild(document.createTextNode(base));
  return span;
}
function refLine(ref, extra, cmpA) {
  const li = document.createElement("li");
  li.dataset.id = ref.id;
  li.title = `${ref.qname} — ${ref.file}:${ref.line}`;
  li.appendChild(qnameSpan(ref.qname));
  const loc = document.createElement("span");
  loc.className = "loc";
  loc.textContent = `${midPath(ref.file, 16)}:${ref.line}`;
  li.appendChild(loc);
  if (Array.isArray(extra)) {
    // two-cosine rows (nearest existing: structure, then vocabulary) —
    // each number says what it is on hover (#24)
    li.className = "cos-row2";
    extra.forEach((v, i) => {
      const c = document.createElement("span");
      c.className = "cos";

    go.className = "cmpgo";
    go.textContent = "⇆";
    go.title = `compare side-by-side with ${ref.qname}`;
    go.addEventListener("click", e => {
      e.stopPropagation();

    });

}
/* ── row → map hover linking (TKI-70): any element that names a symbol —

   element already carries the id, so this never fetches (#1). If the
   symbol isn't drawn in the current scope (drilled out, or a test with

   immediately (#39). ── */
function bindRowLink(li, id) {
  const baseTitle = li.title;
  li.addEventListener("mouseenter", () => {
    if (!visible(S[id])) { li.title = baseTitle + " — outside current view"; return; }
    linkHover = id;

  });

// `hoverNote` (TKI-81): how-it's-computed detail that a reader may want

// the visible subtitle a plain sentence.
function listSection(title, titleDim, build, hoverNote) {

  const h = document.createElement("h3");
  h.textContent = title + " ";
  if (hoverNote) h.title = hoverNote;
  if (titleDim) {
    const d = document.createElement("span");
    d.className = "dim";

/* ── code rendering (TKI-61): the server ships text + [start, end, class,
   link] tokens in UTF-16 offsets; the page slices strings directly. ── */
// Emit text[from..to) into `el`: plain text nodes between tokens, spans for
// tokens. `links` wires resolved identifiers to the navigation loop.
function emitToks(el, text, toks, from, to, links) {
  let pos = from;
  for (const t of toks) {
    const s = Math.max(t[0], from), e = Math.min(t[1], to);
    if (e <= s) continue;
    if (s > pos) el.appendChild(document.createTextNode(text.slice(pos, s)));
    const sp = document.createElement("span");
    if (t[2]) sp.className = "tok-" + t[2];
    sp.textContent = text.slice(s, e);
    if (links && t[3] !== null && t[3] !== undefined) {
      sp.classList.add("lnk");
      sp.title = `${S[t[3]].qname} — ${S[t[3]].file}:${S[t[3]].line}`;
      sp.addEventListener("click", () => select(t[3], true));
      bindRowLink(sp, t[3]); // TKI-70: same map-highlight as panel rows
    }
    el.appendChild(sp);
    pos = e;
  }
  if (pos < to) el.appendChild(document.createTextNode(text.slice(pos, to)));
}
function renderCode(src, links) {
  const pre = document.createElement("pre");
  pre.className = "code";
  emitToks(pre, src.text, src.toks, 0, src.text.length, links);
  return pre;
}

async function loadCard(id) {
  const [r, rs] = await Promise.all([
    fetch(`/api/explain?id=${id}`),
    fetch(`/api/source?id=${id}`),
  ]);
  const c = await r.json();
  const src = rs.ok ? await rs.json() : null;
  if (c.id !== selected) return; // stale response
  const card = $("card");
  card.className = "";
  card.textContent = "";
  linkHover = -1; // the old card's rows are gone; no orphaned highlight (#39)

  const h2 = document.createElement("h2");
  h2.appendChild(qnameSpan(c.qname));
  // explicit close (TKI-80), consistent with a board card's own ✕
  const close = document.createElement("span");
  close.className = "close";
  close.textContent = "✕";
  close.title = "close";
  close.addEventListener("click", e => { e.stopPropagation(); deselect(); });
  h2.appendChild(close);
  card.appendChild(h2);
  // the path doubles as the drill ladder: every segment descends to it
  const loc = document.createElement("div");
  loc.className = "loc";
  const segs = c.file.split("/");
  segs.forEach((seg, i) => {
    if (i) loc.appendChild(document.createTextNode("/"));
    const sp = document.createElement("span");
    sp.className = "pathseg";
    sp.textContent = seg;
    const target = segs.slice(0, i + 1).join("/");
    sp.title = `open ${target}`;
    sp.addEventListener("click", () => drillTo(target));
    loc.appendChild(sp);
  });
  loc.appendChild(document.createTextNode(`:${c.line}`));
  card.appendChild(loc);

  // meta line: dim labels, ink values
  const meta = document.createElement("div");
  meta.className = "meta";
  const pair = (label, value) => {
    const s = document.createElement("span");
    const k = document.createElement("span");
    k.className = "k";
    k.textContent = label + " ";
    s.append(k, value);
    return s;
  };
  const items = [pair("nodes", String(c.nodes))];
  if (c.is_test) items.push(document.createTextNode("test"));
  if (c.entry !== null) items.push(pair("entry", `${c.entry}×`));
  if (c.dating) {
    items.push(pair("first", c.dating.first));
    items.push(pair("last", c.dating.last));
    items.push(document.createTextNode(c.dating.activity));
  }
  items.forEach((el, i) => {
    if (i) {
      const sep = document.createElement("span");
      sep.className = "k";
      sep.textContent = " · ";
      meta.appendChild(sep);
    }
    meta.appendChild(el);
  });
  card.appendChild(meta);

  // corpus-grounded prevalence (TKI-74/77): the CLI card's own words,
  // rendered from `explain::fact_lines` server-side — no reformatting
  // here, and the same "; " join the CLI card prints (#41)
  const facts = document.createElement("div");
  facts.className = "facts";
  facts.textContent = c.facts.lines.join("; ");
  card.appendChild(facts);

  // actions: retrace jumps, open the side-by-side (TKI-61)
  const actions = document.createElement("div");
  actions.className = "actions";
  if (navStack.length) {
    const back = document.createElement("button");
    back.className = "chipbtn";
    back.textContent = "← back";
    back.title = `back to ${S[navStack[navStack.length - 1]].qname}`;
    back.addEventListener("click", popBack);
    actions.appendChild(back);
  }
  const cmpBtn = document.createElement("button");
  cmpBtn.className = "chipbtn";
  cmpBtn.textContent = "compare";
  cmpBtn.title = "side by side with its nearest neighbor on the map";
  cmpBtn.addEventListener("click", () => {
    // default B = the same nearest layout neighbor the dropdown will mark
    // "nearest" — one source of truth, so the auto-pick can't drift from
    // what the dropdown claims it is (#24)
    const nn = layoutNeighbors(id, 1);
    openCompare(id, nn.length ? nn[0] : undefined);
  });
  actions.appendChild(cmpBtn);
  card.appendChild(actions);

  // the code itself — the viewer is the panel's primary content;
  // resolved identifiers are clickable (every fact one click from source)
  if (src) card.appendChild(renderCode(src, true));

  // branch-new symbols: the closest already-existing code (the model ranks;
  // the numbers are Channel A/B's)
  if (c.nearest_existing) {
    card.appendChild(listSection("nearest existing",
        "the closest code that already exists", sec => {
      if (!c.nearest_existing.length) {
        const none = document.createElement("div");
        none.className = "none";
        none.textContent = "none";
        sec.appendChild(none);
        return;
      }
      const ul = document.createElement("ul");
      c.nearest_existing.forEach(x => ul.appendChild(refLine(x, [x.a_cos, x.b_cos], id)));
      sec.appendChild(ul);
    }, "ranked by the embedding; the two numbers are structure and vocabulary similarity"));
  }

    card.appendChild(listSection("clones", "code built the same way", sec => {
      if (c.clones.exact.length) {

        sub.className = "shared";
        sub.textContent = "identical structure";
        sec.appendChild(sub);
        const ul = document.createElement("ul");
        c.clones.exact.forEach(x => ul.appendChild(refLine(x, undefined, id)));
        sec.appendChild(ul);
      }
      if (c.clones.near.length) {
        const sub = document.createElement("div");
        sub.className = "shared";
        sub.textContent = "nearly identical";
        sec.appendChild(sub);
        const ul = document.createElement("ul");

      none.className = "none";
      none.textContent = "none";
      sec.appendChild(none);
      return;
    }
    const ul = document.createElement("ul");
    c.twins.members.forEach(x => ul.appendChild(refLine(x, undefined, id)));
    sec.appendChild(ul);
    const sh = document.createElement("div");
    sh.className = "shared";
    sh.textContent = "shared vocabulary: " + c.twins.shared_terms.join(", ");
    sec.appendChild(sh);
  }, c.twins
      ? `identifier vocabulary matches at cosine ≥${c.twins.theta_b.toFixed(2)}; the strongest match here is ${c.twins.b_max.toFixed(2)}`
      : "identifier vocabulary at cosine ≥0.55, with a different structure"));

  card.appendChild(listSection(`callers ${c.callers.length} · callees ${c.callees.length}`,
      null, sec => {
    if (!c.callers.length && !c.callees.length) return;
    if (c.callers.length) {
      const sub = document.createElement("div");
      sub.className = "shared";
      sub.textContent = "callers";
      sec.appendChild(sub);
      const ul = document.createElement("ul");
      c.callers.forEach(x => ul.appendChild(refLine(x, undefined, id)));
      sec.appendChild(ul);
    }
    if (c.callees.length) {
      const sub = document.createElement("div");
      sub.className = "shared";
      sub.textContent = "callees";
      sec.appendChild(sub);
      const ul = document.createElement("ul");
      c.callees.forEach(x => ul.appendChild(refLine(x, undefined, id)));
      sec.appendChild(ul);
    }
  }, "static calls resolved through imports — dynamic dispatch isn't traced"));

  if (c.family) {
    card.appendChild(listSection("family", "experimental", sec => {
      const d = document.createElement("div");
      d.textContent = `in family F${c.family.index} as ${c.family.role} (cosine ${c.family.cos.toFixed(2)})`;
      sec.appendChild(d);
    }));
  }

  // guidance (TKI-70): the 5 nearest layout neighbors — answers "what
  // related code is here?" without forcing a jump-back-and-forth through a
  // single row. Ranked by map-plane distance (a fact of what is drawn); no
  // model numbers shown. Visited ones stay in the list, just marked — the
  // list is a map of the neighborhood, not a to-do queue.
  const nearest = layoutNeighbors(id, 5);
  if (nearest.length) {
    // the ✓ key appears only once there is a ✓ to explain (TKI-81)
    const anyVisited = nearest.some(j => visited.has(j));
    card.appendChild(listSection("nearest on the map",
        anyVisited ? "✓ marks ones you've already visited" : null, sec => {
      const ul = document.createElement("ul");
      nearest.forEach(j => {
        const s = S[j];
        const li = refLine({id: s.id, qname: s.qname, file: s.file, line: s.line}, undefined, id);
        if (visited.has(j)) li.classList.add("visited");
        ul.appendChild(li);
      });
      sec.appendChild(ul);
    }, "the selection's layout neighbors, closest on the map first"));
  }
}

function buildPane(side, regions, key) {

  head.append(b, document.createTextNode(` — ${side.file}:${side.line}`));

  // both sides, but render in this side's own span order regardless
  const order = regions.map((r, i) => [r[key][0], i]).sort((x, y) => x[0] - y[0]);
  let pos = 0;

    const sp = document.createElement("span");
    sp.className = "reg";
    sp.dataset.p = i;
    sp.style.background = regColor(i, "2e");
    if (r.tier === 2) sp.style.borderBottom = `1px dotted ${PALETTE[i % PALETTE.length]}`;
    sp.title = r.tier === 1 ? "identical after whitespace collapse"
                            : "aligned — differs";
    emitToks(sp, side.text, side.toks, s, e, false);
    pre.appendChild(sp);
    pos = e;
  }
  emitToks(pre, side.text, side.toks, pos, side.text.length, false);
  pane.appendChild(pre);
  return pane;
}

// scroll-sync on aligned regions: keep the twin of the region nearest the
// scrolled pane's upper third at the same viewport offset
let syncing = false;
function syncScroll(from, to) {
  if (syncing) return;
  const anchorY = from.scrollTop + from.clientHeight * 0.3;
  let best = null, bestD = Infinity;
  for (const sp of from.querySelectorAll(".reg")) {
    const d = Math.abs(sp.offsetTop - anchorY);
    if (d < bestD) { bestD = d; best = sp; }
  }
  if (!best) return;
  const twin = to.querySelector(`.reg[data-p="${best.dataset.p}"]`);
  if (!twin) return;
  syncing = true;
  to.scrollTop = twin.offsetTop - (best.offsetTop - from.scrollTop);
  requestAnimationFrame(() => { syncing = false; });
}

// The B-side dropdown (TKI-71): A's own top layout neighbors — the same
// set+ranking as the card's "nearest layout neighbors" — plus the pair
// actually being shown if it falls outside that set (a connector or a
// map/panel pick can land anywhere), plus the pick-mode escape hatch.
// RANK order only; no cosine/score ever appears here (#24, DESIGN.md §1.2).
const CMP_PICK = "__pick__";
function populateCompareSelect(aId, bId) {
  const sel = $("cmpbsel");
  sel.textContent = "";
  const seen = new Set();
  const addOption = (sid, note) => {
    if (seen.has(sid)) return;
    seen.add(sid);
    const s = S[sid];
    const opt = document.createElement("option");
    opt.value = String(sid);
    opt.textContent = `${s.qname} · ${midPath(s.file, 20)}` + (note ? ` — ${note}` : "");
    sel.appendChild(opt);
  };
  const neighbors = layoutNeighbors(aId, 10);
  neighbors.forEach((nid, i) => addOption(nid, i === 0 ? "nearest" : undefined));
  if (!seen.has(bId)) addOption(bId, undefined); // honest: show the pair as-is, no false "nearest"
  const pick = document.createElement("option");
  pick.value = CMP_PICK;
  pick.textContent = "pick from map or panel…";
  sel.appendChild(pick);
  sel.value = String(bId);
}

// Sequence-guarded (TKI-68): a connector click compares a pinned pair that
// need not involve the selection, so staleness is "a newer open or a close
// happened while this fetch flew", not "the selection moved".
let cmpSeq = 0;
async function openCompare(id, bid) {
  const seq = ++cmpSeq;
  // switching the B side of an already-open compare must paint a pending
  // state within 100ms (#2) — dim the stale panes rather than freezing them
  const switching = cmp !== null;
  if (switching) $("cmppanes").classList.add("pending");
  let j;
  try {
    const r = await fetch(`/api/compare?id=${id}` + (bid !== undefined ? `&b=${bid}` : ""));
    if (!r.ok) throw new Error((await r.json()).error || `HTTP ${r.status}`);
    j = await r.json();
  } catch (e) {
    if (seq === cmpSeq) {
      $("cmppanes").classList.remove("pending");
      // a failed switch reverts the pane; the dropdown must revert with it
      if (cmp) $("cmpbsel").value = String(cmp.b.id);
    }
    $("readout").textContent =
      `compare failed — ${e instanceof TypeError ? "server unreachable" : e.message}`;
    return;
  }
  if (seq !== cmpSeq) return; // stale response
  cmp = j;
  $("cmptitle").textContent = j.a.qname;
  populateCompareSelect(j.a.id, j.b.id);
  // honest empty state (TKI-66): the alignment found no structural
  // agreement — say so; the tier legend would describe nothing
  $("cmpempty").hidden = j.regions.length > 0;
  document.querySelector("#cmpbar .legend").hidden = j.regions.length === 0;
  const panes = $("cmppanes");
  panes.textContent = "";
  panes.classList.remove("pending");
  const pa = buildPane(j.a, j.regions, "a");
  const pb = buildPane(j.b, j.regions, "b");
  panes.append(pa, pb);
  pa.addEventListener("scroll", () => syncScroll(pa, pb));
  pb.addEventListener("scroll", () => syncScroll(pb, pa));
  // hovering a region highlights its twin
  let hot = -1;
  panes.addEventListener("mousemove", e => {
    const sp = e.target.closest(".reg");
    const p = sp ? +sp.dataset.p : -1;
    if (p === hot) return;
    for (const el of panes.querySelectorAll(".reg.hot")) {
      el.classList.remove("hot");
      el.style.background = regColor(+el.dataset.p, "2e");
    }
    hot = p;
    if (p >= 0) {
      for (const el of panes.querySelectorAll(`.reg[data-p="${p}"]`)) {
        el.classList.add("hot");
        el.style.background = regColor(p, "59");
      }
    }
  });
  $("cmp").hidden = false;
}
function closeCompare() {
  picking = -1;
  cmpSeq++; // any in-flight open lands stale
  if (!cmp) return;
  cmp = null;
  $("cmp").hidden = true;
  $("cmppanes").textContent = "";
  $("cmppanes").classList.remove("pending");
}

/* ── compare pick mode (TKI-66): swap the B side from the map/search ── */
function startPick() {
  if (!cmp) return;
  picking = cmp.a.id;
  $("cmp").hidden = true; // the map is the picker; cmp state stays loaded
  footer();
}
function cancelPick() {
  picking = -1;
  if (cmp) {
    $("cmp").hidden = false; // back to the overlay as it was
    $("cmpbsel").value = String(cmp.b.id); // undo the dropdown's "pick…" selection
  }
  footer();
}

/* ── search ── */
let searchTimer = 0, searchSeq = 0;
function clearHits() {
  hits = [];
  hitSet.clear();
  $("hitlist").hidden = true;
  scheduleDraw();
}
// A failed find must LOOK failed — a dead server rendered as "no results"
// sends the reader hunting for a query that can't work.
function searchError(msg) {
  hits = [];
  hitSet.clear();
  const list = $("hitlist");
  list.textContent = "";
  const row = document.createElement("div");
  row.className = "err";
  row.textContent = msg;
  list.appendChild(row);
  list.hidden = false;
  scheduleDraw();
}
function runSearch(q) {
  const seq = ++searchSeq;
  fetch(`/api/find?q=${encodeURIComponent(q)}&tests=${showTests ? 1 : 0}&top=20`)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(j => {
      if (seq !== searchSeq) return; // a newer query is in flight
      hits = j.hits || [];
      hitSet = new Set(hits.map(h => h.id));
      const list = $("hitlist");
      list.textContent = "";
      for (const h of hits) {
        const row = document.createElement("div");
        const rank = document.createElement("span");
        rank.className = "rank";
        rank.textContent = h.rank;
        const score = document.createElement("span");
        score.className = "score";
        score.textContent = h.score.toFixed(2);
        const name = document.createElement("span");
        name.textContent = h.qname;
        const loc = document.createElement("span");
        loc.className = "loc";
        loc.textContent = `${h.file}:${h.line}`;
        row.append(rank, score, name, loc);
        row.addEventListener("mousedown", e => {
          e.preventDefault();
          select(h.id, true);
          $("hitlist").hidden = true;
        });
        list.appendChild(row);
      }
      list.hidden = hits.length === 0;
      scheduleDraw();
    })
    .catch(e => {
      if (seq !== searchSeq) return;
      searchError(`find failed — ${e instanceof TypeError ? "server unreachable" : e.message}`);
    });
}

/* ── boot ── */
// Legend chips for the current scope: the drill re-keys colors, so chips
// rebuild on every drill change. Click = focus fade; the ▸ glyph = drill
// in (when the key is a path).
function buildChips() {
  const counts = new Map();
  for (const s of S) {
    if (drill && !drill.set.has(s.id)) continue;
    const d = dirOf(s);
    counts.set(d, (counts.get(d) || 0) + 1);
  }
  const dirs = [...counts.entries()].sort((a, b) => b[1] - a[1] || (a[0] < b[0] ? -1 : 1));
  dirColor = {};
  const chips = $("chips");
  chips.textContent = "";
  dirs.forEach(([dir, cnt], i) => {
    dirColor[dir] = PALETTE[i % PALETTE.length];
    const chip = document.createElement("span");
    chip.className = "chip";
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = dirColor[dir];
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(`${dir} ${cnt}`));
    chip.addEventListener("click", () => {
      if (focusDirs.has(dir)) focusDirs.delete(dir); else focusDirs.add(dir);
      chip.classList.toggle("on");
      scheduleDraw();
    });
    // descent is a visible glyph, not a double-click (TKI-68): the chip's
    // click already means focus-fade
    const target = drillTarget(dir);
    if (target) {
      const go = document.createElement("span");
      go.className = "drill";
      go.textContent = "▸";
      go.title = `open ${target}`;
      go.addEventListener("click", e => {
        e.stopPropagation();
        drillTo(target);
      });
      chip.appendChild(go);
    }
    chips.appendChild(chip);
  });

  // branch chip (first in the row, distinct from the dir chips): click
  // toggles branch focus — branch-new points ring, everything else fades
  if (META.branch) {
    const chip = document.createElement("span");
    chip.className = "chip branch" + (branchFocus ? " on" : "");
    const glyph = document.createElement("span");
    glyph.className = "glyph";
    glyph.textContent = "⎇";
    chip.appendChild(glyph);
    chip.appendChild(document.createTextNode(
      `${META.branch.name}: ${META.branch.changed} changed vs ${META.branch.base}`));
    chip.addEventListener("click", () => {
      branchFocus = !branchFocus;
      chip.classList.toggle("on", branchFocus);
      scheduleDraw();
    });
    chips.prepend(chip);
  }
}

function prep() {
  buildChips();

  // calls channel (TKI-72): invert the shipped out-edge arrays once, so
  // incoming edges render fetch-free like everything else on hover (#1)
  callersOf = S.map(() => []);
  for (const s of S) for (const j of s.calls) callersOf[j].push(s.id);

  // radius ∝ sqrt(nodes), mapped into [2, 7] px
  let lo = Infinity, hi = -Infinity;
  for (const s of S) {
    const r = Math.sqrt(s.nodes);
    if (r < lo) lo = r;
    if (r > hi) hi = r;
  }
  radii = S.map(s => hi === lo ? 3.5 : 2 + 5 * (Math.sqrt(s.nodes) - lo) / (hi - lo));
}

/* ── guidance (TKI-54): factual starting points for the current scope ──
   Counts and dates only — akron shows structure, it never judges it.
   Scope-aware: inside a drill every section re-derives over the members. */
// Convention prevalence (TKI-56): module-docstring count for the current
// scope — root = every scanned file, a dir drill = that dir's files (`/`
// segment-bounded, matching the server's own prefix rule), a file drill has
// no prevalence to report. Scoped from META.file_docs the same way the
// other guide facts scope from S: client-side filtering over an immutable
// per-file list, no extra request.
function docFact() {
  if (drill && drill.kind === "file") return null;
  const prefix = drill ? `${drill.path}/` : null;
  const files = (META.file_docs || []).filter(f => {
    if (!showTests && f.is_test) return false;
    if (!drill) return true;
    return f.file === drill.path || f.file.startsWith(prefix);
  });
  if (!files.length) return null;
  return { withDoc: files.filter(f => f.doc).length, total: files.length };
}

function renderGuide() {
  document.querySelector("main").classList.remove("hasSel");
  const card = $("card");
  card.className = "";
  card.textContent = "";
  linkHover = -1; // the old card's rows are gone; no orphaned highlight (#39)
  const scope = S.filter(s => visible(s));
  const h2 = document.createElement("h2");
  h2.textContent = "where to start";
  card.appendChild(h2);
  const loc = document.createElement("div");
  loc.className = "loc";
  loc.textContent = `${drill ? drill.path : BOOT.repo} — ${scope.length} symbols shown`;
  card.appendChild(loc);

  // Plain descriptive count, not a clickable row — there is no obviously
  // useful action to bind (see TKI-56: never flag the minority as wrong).
  const docs = docFact();
  if (docs) {
    card.appendChild(listSection("module docstrings", null, sec => {
      const p = document.createElement("div");
      p.className = "loc";
      p.textContent = `${docs.withDoc} of ${docs.total} files`;
      sec.appendChild(p);
    }));
  }

  const section = (title, dim, rows, hoverNote) => {
    if (!rows.length) return; // no fact, no section
    card.appendChild(listSection(title, dim, sec => {
      const ul = document.createElement("ul");
      rows.forEach(r => ul.appendChild(r));
      sec.appendChild(ul);
    }, hoverNote));
  };
  const row = (nameEl, value, title, onClick) => {
    const li = document.createElement("li");
    li.appendChild(nameEl);
    const v = document.createElement("span");
    v.className = "loc";
    v.textContent = value;
    li.appendChild(v);
    li.title = title;
    li.addEventListener("click", onClick);
    return li;
  };
  const nameEl = text => {
    const n = document.createElement("span");
    n.className = "name";
    n.textContent = text;
    return n;
  };
  const symRow = (s, value) => {
    const li = row(qnameSpan(s.qname), value, `${s.qname} — ${s.file}:${s.line}`, () => select(s.id, true));
    bindRowLink(li, s.id);
    return li;
  };

  if (!drill || drill.kind !== "file") {
    const counts = new Map();
    for (const s of scope) {
      const d = dirOf(s);
      // "." = this scope's root files; ".py" keys are files (flat-drill
      // coloring) — the files section below already carries those
      if (d !== "." && !d.endsWith(".py")) counts.set(d, (counts.get(d) || 0) + 1);
    }
    const dirs = [...counts.entries()]
      .sort((a, b) => b[1] - a[1] || (a[0] < b[0] ? -1 : 1))
      .slice(0, 5)
      .map(([dir, cnt]) => row(nameEl(dir), String(cnt),
        `click to open ${drillTarget(dir)}`, () => drillTo(drillTarget(dir))));
    section("largest dirs", "by symbol count — click one to open it", dirs);

    const fcounts = new Map();
    for (const s of scope) fcounts.set(s.file, (fcounts.get(s.file) || 0) + 1);
    if (fcounts.size > 1) {
      const files = [...fcounts.entries()]
        .sort((a, b) => b[1] - a[1] || (a[0] < b[0] ? -1 : 1))
        .slice(0, 3)
        .map(([file, cnt]) => row(nameEl(midPath(file, 30)), String(cnt),
          `click to open ${file}`, () => drillTo(file)));
      section("largest files", "by symbol count — click one to open it", files);
    }
  }

  const called = scope.filter(s => s.indeg > 0)
    .sort((a, b) => b.indeg - a.indeg || a.id - b.id)
    .slice(0, 5)
    .map(s => symRow(s, `${s.indeg}×`));
  section("most callers", "how many places call them", called,
    "static calls resolved through imports — dynamic dispatch isn't traced");

  const dated = scope.filter(s => s.last_touched !== null)
    .sort((a, b) => b.last_touched - a.last_touched || a.id - b.id)
    .slice(0, 3)
    .map(s => symRow(s, new Date(s.last_touched * 1000).toISOString().slice(0, 10)));
  section("last touched", null, dated);
}

/* ── about this view (TKI-81): the one place each view explains itself ──
   Two or three full sentences per view — the layout, the encodings, and
   their limits — behind a single quiet control at the map's corner. This
   is where the old caption nuggets went: every encoding that was stamped
   on the canvas is still learnable here (#28 moved, not deleted), in
   words that teach instead of abbreviate. */
function aboutParas() {
  if (mode === "map") {
    return [
      `Every dot is a function or class; bigger dots have more parse-tree nodes, and colors follow ${drill ? "the current scope's own groups — see the legend chips" : "the top-level directories"}.`,
      `The layout places each symbol near its ${BOOT.k} nearest neighbors by cosine similarity over code embeddings, so code that reads alike sits close together. The lines fanning out of a selected dot are those neighbors — the links that put it where it is.`,
      "Call arrows are structure, not similarity: amber points at what the selection calls, violet comes from what calls it. Hops past the first draw fainter, and a dashed arrow means the name matched several candidates. Only static, name-resolved calls are traced — dynamic dispatch is invisible.",
    ];
  }
  if (mode === "anchor") {
    return [
      `Both axes measure similarity to ${selected >= 0 ? S[selected].qname : "the anchored symbol"}: structure — how the code is shaped — runs left to right, and vocabulary — the identifiers it uses — runs bottom to top.`,
      "The values are deterministic cosines from the structure (A) and vocabulary (B) channels, the same numbers the panel card shows. Top-right means similar in both senses; top-left means same words in a different shape.",
    ];
  }
  if (mode === "time") {
    return [
      "Symbols spread left to right by when git last touched them; height keeps their position from the map, so neighborhoods stay recognizable.",
      "Symbols with no git history sit parked at the left edge — the footer counts them.",
    ];
  }
  return [
    "Any two measures, one per axis. The PCA options are principal components of the embedding — its directions of greatest variance, ranked, each labeled with the share of variance it explains.",
    "Date axes park symbols without git history at the low edge; the footer counts them.",
  ];
}
function aboutRefresh() {
  const pop = $("aboutPop");
  if (pop.hidden) return;
  pop.textContent = "";
  for (const text of aboutParas()) {
    const p = document.createElement("p");
    p.textContent = text;
    pop.appendChild(p);
  }
}
function aboutToggle(open) {
  const pop = $("aboutPop");
  pop.hidden = open === undefined ? !pop.hidden : !open;
  $("about").classList.toggle("open", !pop.hidden);
  aboutRefresh();
}

function initControls() {
  document.title = `akron explore — ${BOOT.repo}`;
  breadcrumb();
  buildLegend();
  for (const selId of ["ax", "ay"]) {
    const sel = $(selId);
    for (const a of AXES) {
      const o = document.createElement("option");
      o.value = a.id;
      o.textContent = a.label;
      sel.appendChild(o);
    }
  }
  $("ax").value = "pca0";
  $("ay").value = "pca1";
  $("tests").checked = showTests;

  document.querySelectorAll("#views button").forEach(b => {
    b.addEventListener("click", () => { if (!b.disabled) applyMode(b.dataset.mode); });
  });
  const onAxis = async () => {
    axisX = $("ax").value;
    axisY = $("ay").value;
    if ((isAnchorAxis(axisX) || isAnchorAxis(axisY)) && selected >= 0) {
      await loadAnchor(selected);
    }
    layout();
    fitView();
    footer();
    scheduleDraw();
  };
  $("ax").addEventListener("change", onAxis);
  $("ay").addEventListener("change", onAxis);

  // calls channel (TKI-72, depth dropdown TKI-79): persistent channel
  // state like the tests toggle — never an Esc rung. Switching off clears
  // any call-flavored hover at once, even under a resting cursor (#39);
  // switching depth just redraws (the BFS cache keys on depth).
  $("calls").addEventListener("change", () => {
    callDepth = +$("calls").value;
    callsTouched = true;
    if (!callDepth) {
      if (edgeHover && edgeHover.call) edgeHover = null;
      if (connHover && connHover.call) connHover = null;
      // a resting cursor gets no mousemove, so the tip must re-render
      // from the cleared state NOW, not on the next hover pass (#39)
      tooltip();
    }
    footer();
    scheduleDraw();
  });

  $("tests").addEventListener("change", () => {
    showTests = $("tests").checked;
    layout(); // extents are over visible symbols
    if (selected < 0) renderGuide(); // guide facts are scope-wide
    footer();
    scheduleDraw();
  });

  const search = $("search");
  search.addEventListener("input", () => {
    const q = search.value.trim();
    clearTimeout(searchTimer);
    if (q.length < 3) { clearHits(); return; }
    searchTimer = setTimeout(() => runSearch(q), 250);
  });
  search.addEventListener("keydown", e => {
    if (e.key === "Enter" && hits.length) {
      select(hits[0].id, true);
      $("hitlist").hidden = true;
    } else if (e.key === "Escape") {
      $("hitlist").hidden = true;
      search.blur();
    }
  });
  search.addEventListener("focus", () => {
    if (hits.length) $("hitlist").hidden = false;
  });
  document.addEventListener("mousedown", e => {
    if (!$("searchwrap").contains(e.target)) $("hitlist").hidden = true;
    if (!$("about").contains(e.target) && !$("aboutPop").hidden) aboutToggle(false);
  });
  $("aboutBtn").addEventListener("click", () => aboutToggle());

  // pan / zoom / hover / click
  let dragging = false, moved = 0, lastX = 0, lastY = 0;
  canvas.addEventListener("mousedown", e => {
    dragging = true; moved = 0; lastX = e.offsetX; lastY = e.offsetY;
  });
  // single click does it all (TKI-68, double-click is dead): a dot pins
  // its board card AND selects, or unselects on a second click (TKI-80); a
  // board connector opens the compare; a dir label drills; empty canvas
  // unselects (TKI-80). Pick mode narrows a click to choosing the B side.
  window.addEventListener("mouseup", e => {
    if (!dragging) return;
    dragging = false;
    if (moved >= 4) return;
    const mx = e.target === canvas ? e.offsetX : lastX;
    const my = e.target === canvas ? e.offsetY : lastY;
    const id = nearest(mx, my);
    if (id >= 0) {
      if (picking < 0) toggleBoard(id);
      // clicking the already-selected dot again unselects it (TKI-80) —
      // exploration needs a way back to nothing selected as much as a way in
      if (picking < 0 && id === selected) { deselect(); return; }
      select(id, false);
      return;
    }
    if (picking >= 0) return; // picking wants a dot, nothing else
    const c = connectorAt(mx, my);
    if (c) { openCompare(c.a, c.b); return; }
    if (mode === "map") {
      const b = labelBoxes.find(b =>
        b.path && mx >= b.x0 && mx <= b.x1 && my >= b.y0 && my <= b.y1);
      if (b) { drillTo(b.path); return; }
    }
    // a true click that hit no dot/label/connector: empty canvas clears
    // the selection (TKI-80) — drag-pan never reaches here (moved >= 4 above)
    deselect();
  });
  // hover hit-tests (point, edge, island label) run at most once per
  // animation frame — mousemove only records the cursor (TKI-66)
  let hoverRaf = 0;
  canvas.addEventListener("mousemove", e => {
    if (dragging) {
      const dx = e.offsetX - lastX, dy = e.offsetY - lastY;
      moved += Math.abs(dx) + Math.abs(dy);
      view.tx += dx; view.ty += dy;
      lastX = e.offsetX; lastY = e.offsetY;
      $("tip").hidden = true;
      peekCancel(); // panning is not dwelling (#39)
      scheduleDraw();
      return;
    }
    mouse = {x: e.offsetX, y: e.offsetY};
    if (!hoverRaf) hoverRaf = requestAnimationFrame(() => { hoverRaf = 0; hoverUpdate(); });
  });
  canvas.addEventListener("mouseleave", () => {
    mouse = null;
    $("tip").hidden = true;
    peekUpdate(-1); // grace-hide; a re-entry within the grace keeps it
    if (hovered !== -1 || edgeHover || hoverLabel || connHover) {
      hovered = -1;
      edgeHover = null;
      hoverLabel = null;
      connHover = null;
      footer();
      scheduleDraw();
    }
  });
  // Escape ladder (TKI-80): transient state unwinds innermost-first —
  // hitlist, pick mode, compare, the newest board card (TKI-68) — then,
  // with nothing transient left, Esc clears the selection and closes the
  // panel. It no longer walks back-history or climbs the drill (#13, #15):
  // those already have dedicated, visible affordances — the "← back" chip
  // (popBack) and every breadcrumb ancestor segment, which drills up one
  // level exactly as the old fallback did — so Esc's one job stays legible
  // instead of doubling as a silent back button.
  document.addEventListener("keydown", e => {
    if (e.key !== "Escape" || e.target === $("search")) return;
    if (!$("aboutPop").hidden) { aboutToggle(false); return; }
    if (!$("hitlist").hidden) { $("hitlist").hidden = true; return; }
    if (picking >= 0) { cancelPick(); return; }
    if (cmp) { closeCompare(); return; }
    if (boards.length) { removeBoard(boards[boards.length - 1]); return; }
    deselect();
  });
  $("cmpclose").addEventListener("click", closeCompare);
  $("cmpbsel").addEventListener("change", () => {
    const v = $("cmpbsel").value;
    if (v === CMP_PICK) { startPick(); return; }
    openCompare(cmp.a.id, +v);
  });
  canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const f = Math.exp(-e.deltaY * 0.0015);
    const k0 = view.k;
    const k2 = Math.min(80, Math.max(0.25, k0 * f));
    const mx = e.offsetX, my = e.offsetY;
    view.tx = mx - (mx - view.tx) * (k2 / view.k);
    view.ty = my - (my - view.ty) * (k2 / view.k);
    view.k = k2;
    // the map moved under a resting cursor: re-run the hover pass so the
    // tip/peek can't orphan on a dot that zoomed away (#39)
    mouse = {x: mx, y: my};
    if (!hoverRaf) hoverRaf = requestAnimationFrame(() => { hoverRaf = 0; hoverUpdate(); });
    scheduleDraw();
  }, {passive: false});

  // drag-to-connect (TKI-68): from a card header onto another card; the
  // target rings while hovered (visible drop affordance), the connector
  // commits on release — a half-gesture commits nothing (#35)
  document.addEventListener("mousemove", e => {
    if (!dragConn) return;
    const st = $("stage").getBoundingClientRect();
    dragConn.x = e.clientX - st.left;
    dragConn.y = e.clientY - st.top;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const bEl = el && el.closest ? el.closest(".board") : null;
    const over = bEl && +bEl.dataset.id !== dragConn.from ? +bEl.dataset.id : -1;
    if (over !== dragConn.over) {
      for (const b of boards) b.el.classList.toggle("droptarget", b.id === over);
      dragConn.over = over;
    }
    scheduleDraw();
  });
  document.addEventListener("mouseup", () => {
    if (!dragConn) return;
    if (dragConn.over >= 0) {
      manualPairs.add(pairKey(dragConn.from, dragConn.over));
      ensureEdgeTerms({a: dragConn.from, b: dragConn.over});
    }
    for (const b of boards) b.el.classList.remove("droptarget");
    dragConn = null;
    scheduleDraw();
  });

  new ResizeObserver(() => scheduleDraw()).observe($("stage"));
  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: light)")
      .addEventListener("change", () => scheduleDraw());
  }
}

// Stamp each PCA axis with its explained-variance share (real eigenvalue
// shares of total variance, from /api/meta) — the axes picker says what
// each component is worth before it is chosen.
function pcaAxisLabels() {
  for (let c = 0; c < 8; c++) {
    const v = META.pca_var[c];
    if (v === undefined) continue;
    const p = v * 100;
    const label = `PCA-${c + 1} (${p >= 9.5 ? Math.round(p) : p.toFixed(1)}% of variance)`;
    AXES.find(a => a.id === "pca" + c).label = label;
    for (const selId of ["ax", "ay"]) {
      for (const o of $(selId).options) {
        if (o.value === "pca" + c) o.textContent = label;
      }
    }
  }
}

async function boot() {
  initControls();
  const [rs, rm] = await Promise.all([fetch("/api/symbols"), fetch("/api/meta")]);
  const [symbols, meta] = await Promise.all([rs.json(), rm.json()]);
  // assign together, synchronously with layout() below: a resize- or
  // mousemove-scheduled draw must never see S populated but px/py unbuilt
  S = symbols;
  META = meta;
  pcaAxisLabels();
  prep();
  syncViews();
  renderGuide();
  layout();
  fitView();
  footer();
  draw();
}
boot();
</script>
